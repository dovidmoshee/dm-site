<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="900" rx="52" fill="#F7FBFC"/>
  <rect x="86" y="84" width="1028" height="732" rx="34" fill="#FFFFFF" stroke="#D7E5E2" stroke-width="3"/>

