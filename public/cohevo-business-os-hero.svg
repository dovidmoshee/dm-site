    <path d="M310 642H494" stroke="#73986C" stroke-width="4" stroke-linecap="round"/>
    <text x="310" y="630" fill="#697366" font-family="Inter, Arial, sans-serif" font-size="12" letter-spacing="1.2">SOURCE OF TRUTH</text>
  </g>

  <g filter="url(#cardShadow)">
